name: Skill Router Lint

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  check-skill-router:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Validate skill router structure
        run: python3 scripts/check_skill_router.py
